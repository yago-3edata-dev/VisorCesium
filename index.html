<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <script>
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJhMGM2YzExOS01NDNmLTQzYzgtODFlMC05MmVlMzcwMzUyMjEiLCJpZCI6NDE3NjE5LCJpYXQiOjE3NzYyNjc3NjV9.2b-CGPgtnMv7N9Ycy0si9rNwsjGW41OU_arOWkP6ZSI";

    const viewer = new Cesium.Viewer("cesiumContainer", {
      animation: false,
      timeline: false,
      baseLayerPicker: false,
      geocoder: false,
      homeButton: false,
      sceneModePicker: false,
      navigationHelpButton: false,
      fullscreenButton: false,
      infoBox: false,
      selectionIndicator: false
    });

    async function loadTileset() {
      const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(4621173);
      viewer.scene.primitives.add(tileset);
      viewer.zoomTo(tileset);
    }

    loadTileset();
  </script>
</body>
</html>
